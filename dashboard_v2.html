<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير المبيعات — Costamine Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0a0d12;
  --surface: #111620;
  --surface2: #181e2a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #f0c040;
  --accent2: #e8593c;
  --green: #1db97a;
  --blue: #3b8bd4;
  --purple: #8b6ff0;
  --font: 'IBM Plex Sans Arabic', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  direction: rtl;
}
/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: .5px; }
.logo-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.refresh-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 16px;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn svg { width: 13px; height: 13px; }
.status-badge {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--muted);
  display: flex; align-items: center; gap: 5px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
/* ── FILTERS ── */
.filters {
  padding: 12px 28px;
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  justify-content: flex-end;
}
.filter-label { font-size: 11px; color: var(--muted); margin-left: 4px; }
.chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
}
.chip:hover { border-color: var(--border2); color: var(--text); }
.chip.active { background: rgba(240,192,64,0.1); border-color: var(--accent); color: var(--accent); }
/* ── MAIN ── */
.main { padding: 20px 28px; max-width: 1400px; margin: 0 auto; }
/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.kpi:hover { border-color: var(--border2); }
.kpi::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 60px;
  border-radius: 0 0 0 60px;
  opacity: .05;
}
.kpi.gold::before { background: var(--accent); }
.kpi.green::before { background: var(--green); }
.kpi.red::before { background: var(--accent2); }
.kpi.blue::before { background: var(--blue); }
.kpi.purple::before { background: var(--purple); }
.kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.kpi-val { font-size: 22px; font-weight: 600; line-height: 1; margin-bottom: 4px; font-family: var(--mono); }
.kpi-val.gold { color: var(--accent); }
.kpi-val.green { color: var(--green); }
.kpi-val.red { color: var(--accent2); }
.kpi-val.blue { color: var(--blue); }
.kpi-val.purple { color: var(--purple); }
.kpi-sub { font-size: 10px; color: var(--muted); }
/* ── CHART GRID ── */
.chart-row { display: grid; gap: 12px; margin-bottom: 12px; }
.chart-row.cols-1 { grid-template-columns: 1fr; }
.chart-row.cols-2 { grid-template-columns: 1fr 1fr; }
.chart-row.cols-3 { grid-template-columns: 2fr 1fr 1fr; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
.card-title-dot { width: 7px; height: 7px; border-radius: 50%; }
.chart-wrap { position: relative; }
/* ── REGION LIST ── */
.region-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.region-item:last-child { border-bottom: none; }
.region-name { font-size: 12px; color: var(--text); min-width: 80px; }
.region-bar-bg { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; }
.region-bar-fill { height: 100%; border-radius: 3px; background: var(--purple); transition: width .6s ease; }
.region-count { font-size: 11px; color: var(--muted); font-family: var(--mono); min-width: 30px; text-align: left; }
/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { color: var(--muted); font-weight: 400; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right; font-size: 11px; }
.data-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: right; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-family: var(--mono); }
.tag-up { background: rgba(29,185,122,0.15); color: var(--green); }
.tag-dn { background: rgba(232,89,60,0.15); color: var(--accent2); }
/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 999;
  transition: opacity .4s;
}
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--muted); font-family: var(--mono); }
#error-msg {
  display: none;
  background: rgba(232,89,60,0.1);
  border: 1px solid rgba(232,89,60,0.3);
  border-radius: 10px;
  padding: 20px 28px;
  margin: 20px 28px;
  font-size: 13px;
  color: var(--accent2);
}
.last-updated { font-size: 10px; color: var(--muted); font-family: var(--mono); }
/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .chart-row.cols-3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
  .main { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-row.cols-2, .chart-row.cols-3 { grid-template-columns: 1fr; }
  .header { padding: 10px 14px; }
  .filters { padding: 10px 14px; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">جاري تحميل البيانات من Google Sheets...</div>
</div>

<div id="error-msg"></div>

<header class="header">
  <div class="header-right">
    <button class="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      تحديث
    </button>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span id="last-update-text">—</span>
    </div>
  </div>
  <div class="logo">
    <div>
      <div class="logo-text">تقرير المبيعات</div>
      <div class="logo-sub">Costamine Analytics · 2026</div>
    </div>
    <div class="logo-dot"></div>
  </div>
</header>

<div class="filters" id="filters">
  <span class="filter-label">الفترة:</span>
  <button class="chip active" onclick="setFilter('all', this)">الكل</button>
  <button class="chip" onclick="setFilter('sales', this)">مبيعات فقط</button>
  <button class="chip" onclick="setFilter('returns', this)">مرتجعات فقط</button>
  <button class="chip" id="chip-m4" onclick="setFilter('m4', this)" style="display:none">أبريل</button>
  <button class="chip" id="chip-m5" onclick="setFilter('m5', this)" style="display:none">مايو</button>
</div>

<main class="main" id="main" style="display:none">
  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Daily chart -->
  <div class="chart-row cols-1">
    <div class="card">
      <div class="card-header">
        <span></span>
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--blue)"></div>
          المبيعات اليومية (ج.م)
        </div>
      </div>
      <div class="chart-wrap" style="height:180px">
        <canvas id="dailyChart" role="img" aria-label="المبيعات اليومية بالجنيه المصري"></canvas>
      </div>
    </div>
  </div>

  <!-- Row 2 -->
  <div class="chart-row cols-3">
    <div class="card">
      <div class="card-header">
        <span></span>
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--accent)"></div>
          توزيع الفئات
        </div>
      </div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="catChart" role="img" aria-label="توزيع المبيعات على فئات المنتجات"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span></span>
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--green)"></div>
          أيام الأسبوع
        </div>
      </div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="dowChart" role="img" aria-label="توزيع المبيعات على أيام الأسبوع"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span></span>
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--accent2)"></div>
          مبيعات / مرتجعات
        </div>
      </div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="srChart" role="img" aria-label="مقارنة المبيعات بالمرتجعات"></canvas>
      </div>
    </div>
  </div>

  <!-- Row 3 -->
  <div class="chart-row cols-2">
    <div class="card">
      <div class="card-header">
        <span></span>
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--purple)"></div>
          أعلى المحافظات مبيعاً
        </div>
      </div>
      <div id="regionList"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span></span>
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--accent)"></div>
          أعلى المنتجات مبيعاً
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table" id="topProductsTable">
          <thead><tr><th>المنتج</th><th>القيمة (ج)</th><th>القطع</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnWKVfhHl6cD2lnMLrdXPntA0buQszjurxIjLuucKxlRhNNRYls4ivUGBVVgAtdCy3tvZLJ2EHet8A/pub?gid=411887403&single=true&output=csv';

let allRows = [];
let currentFilter = 'all';
let charts = {};

const COL = {
  date: 'posting date',
  category: 'Product Hierarchy',
  valueEGP: 'إجمالي القيمة بالجنيه بعد الخص',
  qty: 'عدد القطع لوحدة البيع',
  billingType: 'Billing Type',
  region: 'Region of Sales Order',
  invoice: 'Bill. Doc.',
  material: 'Material'
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, ''));
    return obj;
  }).filter(r => r[COL.date]);
}

function filterRows(rows) {
  let r = rows;
  if (currentFilter === 'sales') r = r.filter(x => x[COL.billingType] === 'اونلاين');
  else if (currentFilter === 'returns') r = r.filter(x => x[COL.billingType] === 'مرتجع اونلاين');
  else if (currentFilter === 'm4') r = r.filter(x => (x[COL.date] || '').startsWith('2026-04'));
  else if (currentFilter === 'm5') r = r.filter(x => (x[COL.date] || '').startsWith('2026-05'));
  return r;
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'م';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'ك';
  return Math.round(n).toLocaleString();
}

function renderKPIs(rows) {
  const sales = rows.filter(r => r[COL.billingType] === 'اونلاين');
  const returns = rows.filter(r => r[COL.billingType] === 'مرتجع اونلاين');
  const totalSales = sales.reduce((s, r) => s + (parseFloat(r[COL.valueEGP]) || 0), 0);
  const totalReturns = Math.abs(returns.reduce((s, r) => s + (parseFloat(r[COL.valueEGP]) || 0), 0));
  const netSales = totalSales - totalReturns;
  const invoices = new Set(sales.map(r => r[COL.invoice])).size;
  const units = sales.reduce((s, r) => s + (parseFloat(r[COL.qty]) || 0), 0);
  const avgInvoice = invoices > 0 ? totalSales / invoices : 0;
  const retRate = (totalSales > 0 ? (totalReturns / totalSales * 100) : 0).toFixed(1);

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi green"><div class="kpi-label">إجمالي المبيعات</div><div class="kpi-val green">${fmtNum(totalSales)}</div><div class="kpi-sub">ج.م قبل المرتجعات</div></div>
    <div class="kpi blue"><div class="kpi-label">صافي المبيعات</div><div class="kpi-val blue">${fmtNum(netSales)}</div><div class="kpi-sub">ج.م بعد المرتجعات</div></div>
    <div class="kpi red"><div class="kpi-label">المرتجعات</div><div class="kpi-val red">${fmtNum(totalReturns)}</div><div class="kpi-sub">نسبة ${retRate}%</div></div>
    <div class="kpi"><div class="kpi-label">عدد الفواتير</div><div class="kpi-val">${invoices.toLocaleString()}</div><div class="kpi-sub">فاتورة مبيعات</div></div>
    <div class="kpi gold"><div class="kpi-label">عدد القطع</div><div class="kpi-val gold">${Math.round(units).toLocaleString()}</div><div class="kpi-sub">وحدة مباعة</div></div>
    <div class="kpi purple"><div class="kpi-label">متوسط الفاتورة</div><div class="kpi-val purple">${fmtNum(avgInvoice)}</div><div class="kpi-sub">ج.م للفاتورة</div></div>
  `;
}

function renderDaily(rows) {
  const sales = rows.filter(r => r[COL.billingType] === 'اونلاين');
  const byDate = {};
  sales.forEach(r => {
    const d = (r[COL.date] || '').split(' ')[0].split('T')[0];
    if (!d) return;
    byDate[d] = (byDate[d] || 0) + (parseFloat(r[COL.valueEGP]) || 0);
  });
  const dates = Object.keys(byDate).sort();
  const vals = dates.map(d => Math.round(byDate[d]));
  const labels = dates.map(d => d.slice(5));

  destroyChart('daily');
  charts.daily = new Chart(document.getElementById('dailyChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: vals,
        borderColor: '#3b8bd4',
        backgroundColor: 'rgba(59,139,212,0.08)',
        fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2,
        pointBackgroundColor: '#3b8bd4'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { size: 9 }, maxTicksLimit: 20, autoSkip: true } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { size: 9 }, callback: v => fmtNum(v) } }
      }
    }
  });
}

function renderCategories(rows) {
  const sales = rows.filter(r => r[COL.billingType] === 'اونلاين');
  const byCat = {};
  sales.forEach(r => {
    const c = r[COL.category] || 'أخرى';
    byCat[c] = (byCat[c] || 0) + (parseFloat(r[COL.valueEGP]) || 0);
  });
  const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]).slice(0, 7);
  const colors = ['#f0c040','#3b8bd4','#1db97a','#8b6ff0','#e8593c','#e8903c','#3bc4d4'];

  destroyChart('cat');
  charts.cat = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: sorted.map(x => x[0]),
      datasets: [{ data: sorted.map(x => Math.round(x[1])), backgroundColor: colors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { display: true, position: 'bottom', labels: { color: '#6b7280', font: { size: 10 }, boxWidth: 10, padding: 6 } } }
    }
  });
}

function renderDOW(rows) {
  const sales = rows.filter(r => r[COL.billingType] === 'اونلاين');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const arNames = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const byDay = {};
  dayNames.forEach(d => byDay[d] = 0);
  sales.forEach(r => {
    const d = r[COL.date] ? new Date(r[COL.date]).getDay() : -1;
    if (d >= 0) byDay[dayNames[d]] += (parseFloat(r[COL.valueEGP]) || 0);
  });
  const vals = dayNames.map(d => Math.round(byDay[d]));
  const maxVal = Math.max(...vals);

  destroyChart('dow');
  charts.dow = new Chart(document.getElementById('dowChart'), {
    type: 'bar',
    data: {
      labels: arNames,
      datasets: [{
        data: vals,
        backgroundColor: vals.map(v => v === maxVal ? '#1db97a' : 'rgba(29,185,122,0.25)'),
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { size: 9 }, callback: v => fmtNum(v) } },
        y: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }
      }
    }
  });
}

function renderSalesVsReturns(rows) {
  const months = {};
  rows.forEach(r => {
    const m = (r[COL.date] || '').slice(0, 7);
    if (!m) return;
    if (!months[m]) months[m] = { sales: 0, returns: 0 };
    const v = parseFloat(r[COL.valueEGP]) || 0;
    if (r[COL.billingType] === 'اونلاين') months[m].sales += v;
    else if (r[COL.billingType] === 'مرتجع اونلاين') months[m].returns += Math.abs(v);
  });
  const labels = Object.keys(months).sort();
  const arMonths = { '2026-04': 'أبريل', '2026-05': 'مايو', '2026-06': 'يونيو', '2026-07': 'يوليو', '2026-08': 'أغسطس', '2026-09': 'سبتمبر', '2026-10': 'أكتوبر', '2026-11': 'نوفمبر', '2026-12': 'ديسمبر', '2026-01': 'يناير', '2026-02': 'فبراير', '2026-03': 'مارس' };

  destroyChart('sr');
  charts.sr = new Chart(document.getElementById('srChart'), {
    type: 'bar',
    data: {
      labels: labels.map(l => arMonths[l] || l),
      datasets: [
        { label: 'مبيعات', data: labels.map(l => Math.round(months[l].sales)), backgroundColor: 'rgba(29,185,122,0.6)', borderRadius: 4 },
        { label: 'مرتجعات', data: labels.map(l => Math.round(months[l].returns)), backgroundColor: 'rgba(232,89,60,0.6)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#6b7280', font: { size: 10 }, boxWidth: 10 } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#6b7280', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', font: { size: 9 }, callback: v => fmtNum(v) } }
      }
    }
  });
}

function renderRegions(rows) {
  const sales = rows.filter(r => r[COL.billingType] === 'اونلاين');
  const byRegion = {};
  sales.forEach(r => {
    const reg = r[COL.region] || 'غير محدد';
    byRegion[reg] = (byRegion[reg] || 0) + 1;
  });
  const sorted = Object.entries(byRegion).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const max = sorted[0]?.[1] || 1;
  const arRegions = { Cairo:'القاهرة', Giza:'الجيزة', Alexandria:'الإسكندرية', Dakahlia:'الدقهلية', 'Al Sharqia':'الشرقية', Gharbia:'الغربية', Monufia:'المنوفية', Qalyubia:'القليوبية', Damietta:'دمياط', Ismailia:'الإسماعيلية', Suez:'السويس', 'six october':'6 أكتوبر', Minya:'المنيا', 'Port Said':'بورسعيد', Sohag:'سوهاج', Beheira:'البحيرة', Faiyum:'الفيوم', 'Red Sea':'البحر الأحمر', 'Beni Suef':'بني سويف', Qena:'قنا', Asyut:'أسيوط', Luxor:'الأقصر', 'South Sinai':'جنوب سيناء', 'Kafr el-Sheikh':'كفر الشيخ' };

  document.getElementById('regionList').innerHTML = sorted.map(([r, v]) => `
    <div class="region-item">
      <span class="region-name">${arRegions[r] || r}</span>
      <div class="region-bar-bg"><div class="region-bar-fill" style="width:${(v / max * 100).toFixed(0)}%"></div></div>
      <span class="region-count">${v}</span>
    </div>
  `).join('');
}

function renderTopProducts(rows) {
  const sales = rows.filter(r => r[COL.billingType] === 'اونلاين');
  const byProd = {};
  sales.forEach(r => {
    const p = r[COL.category] || 'أخرى';
    if (!byProd[p]) byProd[p] = { val: 0, qty: 0 };
    byProd[p].val += (parseFloat(r[COL.valueEGP]) || 0);
    byProd[p].qty += (parseFloat(r[COL.qty]) || 0);
  });
  const sorted = Object.entries(byProd).sort((a, b) => b[1].val - a[1].val).slice(0, 8);
  const maxVal = sorted[0]?.[1].val || 1;

  document.querySelector('#topProductsTable tbody').innerHTML = sorted.map(([name, d], i) => `
    <tr>
      <td>${name}</td>
      <td style="color:var(--accent);font-family:var(--mono)">${Math.round(d.val).toLocaleString()}</td>
      <td style="color:var(--muted);font-family:var(--mono)">${Math.round(d.qty)}</td>
    </tr>
  `).join('');
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function renderAll(rows) {
  const filtered = filterRows(rows);
  renderKPIs(filtered);
  renderDaily(filtered);
  renderCategories(filtered);
  renderDOW(filtered);
  renderSalesVsReturns(filtered);
  renderRegions(filtered);
  renderTopProducts(filtered);
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderAll(allRows);
}

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').style.opacity = '1';
  document.getElementById('error-msg').style.display = 'none';

  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL + "&t=" + Date.now())}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allRows = parseCSV(text);

    if (allRows.length === 0) throw new Error('البيانات فارغة');

    // detect available months & show chips
    const months = new Set(allRows.map(r => (r[COL.date] || '').slice(0, 7)));
    document.getElementById('chip-m4').style.display = months.has('2026-04') ? '' : 'none';
    document.getElementById('chip-m5').style.display = months.has('2026-05') ? '' : 'none';

    renderAll(allRows);

    const now = new Date();
    document.getElementById('last-update-text').textContent = `آخر تحديث: ${now.toLocaleTimeString('ar-EG')}`;

    document.getElementById('main').style.display = 'block';
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 400);

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'block';
    errEl.textContent = '⚠️ تعذر تحميل البيانات: ' + err.message + ' — تأكد من أن الـ Google Sheet منشور كـ CSV وحاول مرة تانية.';
  }
}

loadData();
</script>
